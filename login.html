[data-theme="dark"] .input-group input {
    background: var(--white);
    border-color: #24334d;
    color: var(--color-1);
}

[data-theme="dark"] .btn-login:hover {
    background: #2a5686;
}

body { 
    background-color: var(--bg-color);
    background-image: var(--bg-pattern), var(--bg-blobs), var(--bg-gradient);
    background-attachment: fixed, fixed, fixed;
    background-size: 225px 225px, cover, cover;
    background-repeat: repeat, no-repeat, no-repeat;
    background-position: 0 0, center, center;
    color: var(--color-1); 
    min-height: 100vh; 
    display: flex; 
    justify-content: center; 
    align-items: center;
    padding: 24px 20px;
    transition: background-color 0.4s ease, color 0.4s ease, background-image 0.4s ease;
    zoom: 0.88;
}

.theme-toggle-btn {
    position: fixed;
    top: 14px;
    left: 14px;
    width: 42px;
    height: 42px;
    border-radius: 50%;
    background: var(--white);
    border: 1px solid var(--color-4);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    z-index: 100;
    box-shadow: 0 4px 15px rgba(5, 38, 89, 0.15);
    transition: background 0.3s ease, transform 0.15s ease;
}

.theme-toggle-btn:active {
    transform: scale(0.9);
}

.theme-toggle-btn svg {
    width: 20px;
    height: 20px;
    stroke: var(--color-2);
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
}

.theme-toggle-btn .icon-moon { display: none; }
[data-theme="dark"] .theme-toggle-btn .icon-sun { display: none; }
[data-theme="dark"] .theme-toggle-btn .icon-moon { display: block; }
        
.login-wrapper {
    width: 100%;
    max-width: 360px;
    animation: fadeIn 0.8s ease-out;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

.glass-card { 
    background: var(--white); 
    border-radius: 18px; 
    padding: 36px 28px; 
    text-align: center; 
    box-shadow: 
        0 0 0 1px rgba(5, 38, 89, 0.04),
        0 2px 8px rgba(0, 0, 0, 0.08),
        0 8px 24px rgba(5, 38, 89, 0.12),
        0 24px 56px rgba(5, 38, 89, 0.12);
    border: 1px solid rgba(255, 255, 255, 0.8);
    position: relative;
}
    
.logo-profile {
    width: 65px;
    height: 65px;
    margin: 0 auto 14px;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden; 
}

.logo-profile img {
    width: 120%;
    height: 120%;
    object-fit: contain;
    transform: translateX(0.6px);
}

.title {
    font-size: 26px;
    font-weight: 700;
    color: var(--color-2);
    letter-spacing: -1px;
    line-height: 1.2;
}
    
.subtitle {
    font-size: 13px;
    color: var(--color-3);
    margin-bottom: 24px;
    font-weight: 500;
}

.input-group {
    margin-bottom: 12px;
    text-align: left;
    position: relative;
}

.input-group label {
    display: block;
    font-size: 10px;
    font-weight: 700;
    color: var(--color-2);
    margin-bottom: 6px;
    margin-left: 5px;
    text-transform: uppercase;
    letter-spacing: 1px;
}

.input-group input {
    width: 100%;
    background: #f8fbfc;
    border: 2px solid #e1e8ef;
    padding: 12px 16px;
    border-radius: 12px;
    color: var(--color-1);
    font-weight: 600;
    font-size: 13px;
    outline: none;
    transition: all 0.3s ease;
}

.input-group input:focus {
    border-color: var(--color-3);
    background: var(--white);
    box-shadow: 0 8px 20px rgba(84, 131, 179, 0.15);
}

.pass-wrapper { 
    position: relative; 
    display: flex; 
    align-items: center; 
}

.toggle-pass {
    position: absolute;
    right: 20px;
    cursor: pointer;
    color: var(--color-3);
    display: flex;
    align-items: center;
}

.toggle-pass svg { 
    width: 20px; 
    height: 20px; 
    stroke: currentColor; 
    fill: none; 
    stroke-width: 2; 
}

.btn-login {
    width: 100%;
    background: var(--color-2);
    color: var(--accent-light);
    border: none;
    padding: 14px;
    border-radius: 12px;
    font-weight: 800;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    margin-top: 8px;
    box-shadow: 0 8px 16px rgba(5, 38, 89, 0.2);
    text-transform: uppercase;
    letter-spacing: 1px;
}

.btn-login:hover {
    background: var(--color-1);
    transform: translateY(-2px);
}

.error-msg {
    color: var(--error);
    font-size: 12px;
    font-weight: 600;
    margin-top: 5px; 
    margin-left: 5px;
    display: none;
    animation: fadeInMsg 0.3s ease;
}

@keyframes fadeInMsg {
    from { 
        opacity: 0; 
        transform: translateY(-5px); 
    }
    to { 
        opacity: 1; 
        transform: translateY(0); 
    }
}

.footer-text {
    margin-top: 20px;
    font-size: 11px;
    color: var(--color-4);
    font-weight: 500;
}

/* SweetAlert2 Custom */
.swal-custom-popup {
    border-radius: 18px !important;
    padding: 28px 24px !important;
    box-shadow: 0 20px 60px rgba(5, 38, 89, 0.18) !important;
    border: 1.5px solid #e1e8ef !important;
    font-family: 'Poppins', sans-serif !important;
    max-width: 320px !important;
}

.swal-custom-title {
    font-size: 17px !important;
    font-weight: 700 !important;
    color: #052659 !important;
    letter-spacing: -0.3px !important;
}

.swal-custom-btn {
    border-radius: 10px !important;
    font-weight: 700 !important;
    font-size: 13px !important;
    padding: 10px 28px !important;
    letter-spacing: 0.5px !important;
    text-transform: uppercase !important;
    box-shadow: 0 6px 16px rgba(5, 38, 89, 0.2) !important;
    transition: all 0.2s ease !important;
}

</style>
<script>
    (function () {
        var saved = localStorage.getItem('skuyTheme');
        var theme = saved || (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', theme);
    })();
    function toggleTheme() {
        var current = document.documentElement.getAttribute('data-theme') === 'dark' ? 'dark' : 'light';
        var next = current === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        localStorage.setItem('skuyTheme', next);
    }
</script>

        </div>

        <button class="btn-login" id="loginBtn" onclick="handleLogin()">Akses Jadwal</button>

        <div class="footer-text">

        </div>

</div>

<script>
window.onload = function() {
    document.getElementById('footerYear').textContent = new Date().getFullYear();
    if (localStorage.getItem('isLoggedIn') === 'true') {
        window.location.href = './index.html';
    }
};

function togglePassword() {
    const passInput = document.getElementById('password');
    const eyeIcon = document.getElementById('eyeIcon');
    if (passInput.type === 'password') {
        passInput.type = 'text';
        eyeIcon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>';
    } else {
        passInput.type = 'password';
        eyeIcon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>';
    }
}

function handleLogin() {
    const email = document.getElementById('username').value.toLowerCase();
    const errorBox = document.getElementById('errorBox');
    errorBox.style.display = 'none';

    if (!email.endsWith("@smkn2sragen.sch.id")) {
        Swal.fire({
            title: 'Akses Ditolak!',
            text: 'Mohon gunakan email sekolah!',
            icon: 'error',
            confirmButtonText: 'Oke, Mengerti',
            confirmButtonColor: '#052659',
            background: '#ffffff',
            color: '#021024',
            customClass: {
                popup: 'swal-custom-popup',
                title: 'swal-custom-title',
                confirmButton: 'swal-custom-btn'
            },
            showClass: {
                popup: 'animate__animated animate__fadeInDown animate__faster'
            },
            hideClass: {
                popup: 'animate__animated animate__fadeOutUp animate__faster'
            }
        });
        return;
    }

    if (email === "admin@smkn2sragen.sch.id") {
        localStorage.setItem('role', 'admin');
        localStorage.setItem('userKelas', 'ADMIN');
        localStorage.setItem('isLoggedIn', 'true');
        window.location.href = './index.html';
        return;
    }

    if (email.startsWith('sek')) {
        let rawKelas = email.replace('sek', '').split('@')[0];
        let parts = rawKelas.match(/[a-z]+|\d+/gi);
        let kelasFix = parts ? parts.join(' ').toUpperCase() : rawKelas.toUpperCase();

        localStorage.setItem('role', 'sekretaris');
        localStorage.setItem('userKelas', kelasFix);
        localStorage.setItem('isLoggedIn', 'true');
        window.location.href = './index.html';
        return;
    }
    const idStr = email.split('@')[0];
    const id = parseInt(idStr);
    let kelas = "";

    if (id >= 12075 && id <= 12110) kelas = "TKP 1";
    else if (id >= 12111 && id <= 12145) kelas = "TKP 2";
    else if (id >= 12146 && id <= 12181) kelas = "DPIB 1";
    else if (id >= 12182 && id <= 12217) kelas = "DPIB 2";
    else if (id >= 12218 && id <= 12253) kelas = "TP 1";
    else if (id >= 12254 && id <= 12289) kelas = "TP 2";
    else if (id >= 12290 && id <= 12324) kelas = "TP 3";
    else if (id >= 12325 && id <= 12359) kelas = "TP 4";
    else if (id >= 12360 && id <= 12395) kelas = "TKR 1";
    else if (id >= 12396 && id <= 12431) kelas = "TKR 2";
    else if (id >= 12432 && id <= 12467) kelas = "TKR 3";
    else if (id >= 12468 && id <= 12503) kelas = "TKR 4";
    else if (id >= 12504 && id <= 12539) kelas = "TITL 1";
    else if (id >= 12540 && id <= 12575) kelas = "TITL 2";
    else if (id >= 12576 && id <= 12611) kelas = "TITL 3";
    else if (id >= 12612 && id <= 12647) kelas = "TITL 4";
    else if (id >= 12648 && id <= 12683) kelas = "TKJ 1";
    else if (id >= 12684 && id <= 12719) kelas = "TKJ 2";

    if (kelas !== "") {
        localStorage.setItem('userKelas', kelas);
        localStorage.setItem('role', 'user');
        localStorage.setItem('isLoggedIn', 'true');
        window.location.href = './index.html';
    } else {
        errorBox.style.display = 'block';
        errorBox.innerText = "Email yang Anda masukkan tidak terdaftar. Silakan coba lagi.";
    }
}

(function normalizeFontSize() {
    var TARGET = 7.5;
    function applyFix() {
        var probe = document.createElement('div');
        probe.style.cssText = 'position:fixed;visibility:hidden;pointer-events:none;width:100px;font-size:10px;line-height:1;';
        document.documentElement.appendChild(probe);
        var actual = parseFloat(window.getComputedStyle(probe).fontSize);
        document.documentElement.removeChild(probe);
        var ratio = TARGET / actual;
        document.documentElement.style.setProperty('font-size', (ratio * 10) + 'px', 'important');
    }
    applyFix();
    window.addEventListener('resize', applyFix);
    window.addEventListener('orientationchange', applyFix);
})();
